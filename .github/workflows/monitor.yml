name: Weekly Evidence Monitor

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      topic_id:
        description: "Topic ID to monitor (e.g. ssri-depression)"
        required: true
        type: string

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e "."

      - name: Search for new studies
        env:
          TOPIC_ID: ${{ inputs.topic_id || 'ssri-depression' }}
        run: evidence-sync search "$TOPIC_ID"

      - name: Run meta-analysis
        env:
          TOPIC_ID: ${{ inputs.topic_id || 'ssri-depression' }}
        run: evidence-sync analyze "$TOPIC_ID"

      # NOTE: The extraction step requires ANTHROPIC_API_KEY and is optional.
      # If studies already have extracted data (effect_size, CI), search + analyze
      # is sufficient. Only enable extraction when new studies need data pulled
      # from abstracts via Claude.
      #
      # To enable extraction, uncomment the step below:
      #
      # - name: Extract data from new studies
      #   env:
      #     ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      #     TOPIC_ID: ${{ inputs.topic_id || 'ssri-depression' }}
      #   run: evidence-sync extract "$TOPIC_ID"
